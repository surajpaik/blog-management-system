<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
	th:fragment="mybaselayout(content)">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

<!-- Bootstrap icon CSS -->

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!--  Bootstrap CSS -->

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">

<!-- Normal CSS -->

<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
</head>
<body>

	<!-- ================= NAVBAR START ================= -->
	<nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">

		<div class="container">

			<!-- Logo -->
			<a class="navbar-brand fw-bold fs-3 text-primary" th:href="@{/}">
				<i class="bi bi-journal-richtext"></i> BlogSphere
			</a>

			<!-- Mobile Toggle Button -->
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarNav">

				<span class="navbar-toggler-icon"></span>

			</button>

			<!-- Navbar Content -->
			<div class="collapse navbar-collapse" id="navbarNav">

				<!-- Left Menu -->
				<ul class="navbar-nav mx-auto">

					<li class="nav-item"><a class="nav-link" th:href="@{/}"> <i
							class="bi bi-house-door-fill"></i> Home

					</a></li>

					<!-- ADMIN -->

					<li class="nav-item"><a sec:authorize="hasAuthority('ADMIN')"
						class="nav-link" th:href="@{/dashboard/admin}"> <i
							class="bi bi-speedometer2"></i> Admin Dashboard

					</a></li>

					<!-- GUEST -->

					<li class="nav-item"><a sec:authorize="hasAuthority('GUEST')"
						class="nav-link" th:href="@{/dashboard/guest}"> <i
							class="bi bi-person-circle"></i> My Dashboard

					</a></li>

				</ul>

				<!-- Right Menu -->

				<ul class="navbar-nav ms-auto">

					<!-- Signup -->

					<li class="nav-item"><a sec:authorize="isAnonymous()"
						class="nav-link" th:href="@{/auth/signup}"> <i
							class="bi bi-person-plus"></i> Signup

					</a></li>

					<!-- Login -->

					<li class="nav-item"><a sec:authorize="isAnonymous()"
						class="nav-link" th:href="@{/auth/customlogin}"> <i
							class="bi bi-box-arrow-in-right"></i> Login

					</a></li>

					<!-- Logout -->

					<li class="nav-item" sec:authorize="isAuthenticated()">

						<form th:action="@{/logout}" method="post">

							<button class="btn btn-outline-danger btn-sm">

								<i class="bi bi-box-arrow-right"></i> Logout

							</button>

						</form>

					</li>

				</ul>

			</div>

		</div>

	</nav>
	<!-- ================= NAVBAR END ================= -->


	<!-- main body section starts -->

	<div th:replace="${content}"></div>

	<!-- main body section ends -->
	
	<script th:src="@{/js/login.js}"></script>
	<script th:src="@{/js/signup.js}"></script>

	<script
		src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
		integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
		crossorigin="anonymous"></script>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
		integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
		crossorigin="anonymous"></script>


	<script
		src="https://cdn.ckeditor.com/ckeditor5/41.4.2/classic/ckeditor.js"></script>

	<script>
    ClassicEditor
        .create(document.querySelector('#shortDescription'))
        .catch(error => {
            console.error(error);
        });

    ClassicEditor
        .create(document.querySelector('#content'))
        .catch(error => {
            console.error(error);
        });
</script>
</body>
</html>
