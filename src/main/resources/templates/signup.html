<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{baseui::mybaselayout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>

	<section class="login-section py-5">

		<div class="container">

			<div class="row justify-content-center">

				<div class="col-lg-6 col-md-8">

					<div class="login-card">

						<!-- Header -->
						<div class="text-center mb-4">

							<i class="bi bi-person-plus-fill login-logo"></i>

							<h2 class="fw-bold mt-3">Create Your Account</h2>

							<p class="text-muted">Join our blogging community and start
								sharing your ideas.</p>

						</div>

						<!-- Success Message -->
						<div class="alert alert-success" th:if="${msg}" th:text="${msg}">
						</div>

						<!-- Error Message -->
						<div class="alert alert-danger" th:if="${error}"
							th:text="${error}"></div>

						<!-- Signup Form -->

						<form th:action="@{/auth/saveuser}" method="post"
							th:object="${user}" id="signupForm">

							<!-- First & Last Name -->

							<div class="row">

								<div class="col-md-6 mb-3">

									<label class="form-label fw-semibold"> First Name </label> <input
										type="text" class="form-control" th:field="*{firstName}"
										placeholder="First Name">

									<div class="text-danger"
										th:if="${#fields.hasErrors('firstName')}">

										<span th:errors="*{firstName}"></span>

									</div>

								</div>

								<div class="col-md-6 mb-3">

									<label class="form-label fw-semibold"> Last Name </label> <input
										type="text" class="form-control" th:field="*{lastName}"
										placeholder="Last Name">

									<div class="text-danger"
										th:if="${#fields.hasErrors('lastName')}">

										<span th:errors="*{lastName}"></span>

									</div>

								</div>

							</div>

							<!-- Email -->

							<div class="mb-3">

								<label class="form-label fw-semibold"> Email Address </label>

								<div class="input-group">

									<span class="input-group-text"> <i
										class="bi bi-envelope"></i>

									</span> <input type="email" class="form-control" th:field="*{email}"
										placeholder="Enter your email">

								</div>

								<div class="text-danger" th:if="${#fields.hasErrors('email')}">

									<span th:errors="*{email}"></span>

								</div>

							</div>

							<!-- Password -->

							<div class="mb-3">

								<label class="form-label fw-semibold"> Password </label>

								<div class="input-group">

									<span class="input-group-text"> <i class="bi bi-lock"></i>

									</span> <input id="password" type="password" class="form-control"
										th:field="*{password}" placeholder="Create a password">

									<button class="btn btn-outline-secondary" type="button"
										onclick="togglePassword('password','eye1')">

										<i id="eye1" class="bi bi-eye"></i>

									</button>

								</div>

								<div class="text-danger"
									th:if="${#fields.hasErrors('password')}">

									<span th:errors="*{password}"></span>

								</div>

							</div>

							<!-- Confirm Password -->

							<div class="mb-3">

								<label class="form-label fw-semibold"> Confirm Password

								</label>

								<div class="input-group">

									<span class="input-group-text"> <i
										class="bi bi-lock-fill"></i>

									</span> <input id="confirmPassword" type="password"
										class="form-control" placeholder="Confirm your password">

									<button class="btn btn-outline-secondary" type="button"
										onclick="togglePassword('confirmPassword','eye2')">

										<i id="eye2" class="bi bi-eye"></i>

									</button>

								</div>

								<small id="passwordMessage" class="mt-2 d-block"></small>

							</div>

							<!-- Button -->

							<button type="submit" class="btn btn-primary w-100 login-btn">

								Create Account</button>

						</form>

						<!-- Login -->

						<div class="text-center mt-4">

							<span class="text-muted"> Already have an account? </span> <a
								th:href="@{/auth/customlogin}"
								class="fw-semibold text-decoration-none"> Login </a>

						</div>

					</div>

				</div>

			</div>

		</div>

	</section>

</body>
</html>
