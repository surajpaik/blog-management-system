<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{baseui::mybaselayout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>

	<section>

		<div class="container">

			<div class="row">

				<div class="col-md-10 offset-md-1">

					<h2>Update Blog Post</h2>
					<div class="card">
						<div class="card-body">

							<form th:action="@{/post/updatepost}" method="post"
								enctype="multipart/form-data" th:object="${post}">

								<!-- post id hidden parameter -->

								<input type="hidden" th:field="*{id}" />

								<!-- post imagename hidden parameter -->

								<input type="hidden" th:field="*{postImageName}" />

								<div class="mb-3">
									<label for="pt" class="form-label">Post title</label> <input
										type="text" th:field="*{title}" class="form-control" id="pt"
										aria-describedby="emailHelp">
									<div class="text-danger" th:if="${#fields.hasErrors('title')}">
										<span th:errors="*{title}"></span>
									</div>
								</div>

								<div class="form-group">
									<select class="form-select" aria-label="Default select example"
										th:field="*{categoryId}">
										<option value="">--SELECT CATEGORY--</option>
										<option th:each="cat : ${categories}" th:value="${cat.id}"
											th:text="${cat.name}"></option>
									</select>
									<div class="text-danger"
										th:if="${#fields.hasErrors('categoryId')}">
										<span th:errors="*{categoryId}"></span>
									</div>

								</div>

								<div class="mb-3">
									<label for="inputGroupFile02" class="form-label mb-2">
										Upload Image </label> <input type="file" class="form-control"
										name="image" id="inputGroupFile02">
								</div>

								<div class="mb-3">
									<label for="floatingTextarea" class="form-label"> Short
										Description </label>
									<textarea class="form-control" rows="3" th:field="*{shortDesc}"
										id="shortDescription" placeholder="Leave a comment here"></textarea>
									<div class="text-danger"
										th:if="${#fields.hasErrors('shortDesc')}">
										<span th:errors="*{shortDesc}"></span>
									</div>
								</div>
								<div class="mb-3">
									<label for="floatingTextarea" class="form-label">
										Content</label>
									<textarea class="form-control" rows="10" th:field="*{content}"
										id="content" placeholder="Leave a comment here"></textarea>
									<div class="text-danger"
										th:if="${#fields.hasErrors('content')}">
										<span th:errors="*{content}"></span>
									</div>
								</div>
								<button type="submit" class="btn btn-primary">Update</button>
							</form>


							<div class="alert alert-success" th:if="${msg}" th:text="${msg}"
								role="alert"></div>
							<div class="alert alert-danger" th:if="${error}"
								th:text="${error}" role="alert"></div>

						</div>

					</div>



				</div>




			</div>


		</div>

	</section>

</body>
</html>
