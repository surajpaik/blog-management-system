<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{baseui::mybaselayout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>

	<section class="py-5">

		<div class="container">

			<!-- Header -->

			<div class="dashboard-header text-center mb-5">

				<h2 class="fw-bold">

					<i class="bi bi-person-workspace me-2"></i> Guest Dashboard

				</h2>

				<p class="text-muted">Manage your blog posts and create new
					content.</p>

			</div>

			<div class="row g-4 mb-5">

				<!-- My Posts -->
				<div class="col-lg-4 col-md-6">
					<div class="card stats-card">
						<div
							class="card-body d-flex justify-content-between align-items-center">

							<div>
								<small class="text-muted">My Posts</small>
								<h2 th:text="${myPosts}"></h2>
							</div>

							<i class="bi bi-file-earmark-text-fill stats-icon text-primary"></i>

						</div>
					</div>
				</div>

				<!-- Approved -->
				<div class="col-lg-4 col-md-6">
					<div class="card stats-card">
						<div
							class="card-body d-flex justify-content-between align-items-center">

							<div>
								<small class="text-muted">Approved</small>
								<h2 th:text="${approvedPosts}"></h2>
							</div>

							<i class="bi bi-check-circle-fill stats-icon text-success"></i>

						</div>
					</div>
				</div>

				<!-- Pending -->
				<div class="col-lg-4 col-md-6">
					<div class="card stats-card">
						<div
							class="card-body d-flex justify-content-between align-items-center">

							<div>
								<small class="text-muted">Pending</small>
								<h2 th:text="${pendingPosts}"></h2>
							</div>

							<i class="bi bi-hourglass-split stats-icon text-warning"></i>

						</div>
					</div>
				</div>

			</div>

			<!-- Action Cards -->

			<div class="row g-4 justify-content-center">

				<!-- My Posts -->

				<div class="col-lg-4 col-md-6">

					<a th:href="@{/post/allpost}" class="text-decoration-none">

						<div class="card dashboard-card h-100">

							<div class="card-body text-center">

								<div class="dashboard-icon bg-primary-subtle text-primary">

									<i class="bi bi-file-earmark-text"></i>

								</div>

								<h5 class="mt-4 fw-bold">My Posts</h5>

								<p class="text-muted">View, edit and manage your blog posts.

								</p>

							</div>

						</div>

					</a>

				</div>

				<!-- Create Post -->

				<div class="col-lg-4 col-md-6">

					<a th:href="@{/post/newpost}" class="text-decoration-none">

						<div class="card dashboard-card h-100">

							<div class="card-body text-center">

								<div class="dashboard-icon bg-success-subtle text-success">

									<i class="bi bi-plus-circle"></i>

								</div>

								<h5 class="mt-4 fw-bold">Create New Post</h5>

								<p class="text-muted">Write and publish a new blog article.

								</p>

							</div>

						</div>

					</a>

				</div>

			</div>

		</div>

	</section>

</body>
</html>
