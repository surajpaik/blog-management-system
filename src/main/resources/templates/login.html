<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{baseui::mybaselayout(~{::section})}">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>

	<section class="login-section py-5">

		<div class="container">

			<div class="row justify-content-center">

				<div class="col-lg-5 col-md-7">

					<div class="login-card">

						<!-- Header -->
						<div class="text-center mb-4">

							<i class="bi bi-journal-richtext login-logo"></i>

							<h2 class="fw-bold mt-3">Welcome Back 👋</h2>

							<p class="text-muted">Sign in to continue your blogging
								journey.</p>

						</div>

						<!-- Success Message -->
						<div class="alert alert-success" th:if="${msg}" th:text="${msg}">
						</div>

						<!-- Error Message -->
						<div class="alert alert-danger" th:if="${error}"
							th:text="${error}"></div>

						<!-- Login Form -->
						<form th:action="@{/login}" method="post">

							<!-- Email -->

							<div class="mb-4">

								<label class="form-label fw-semibold"> Email Address </label>

								<div class="input-group">

									<span class="input-group-text"> <i
										class="bi bi-envelope"></i>
									</span> <input type="email" class="form-control" name="username"
										placeholder="Enter your email" required autofocus>

								</div>

							</div>

							<!-- Password -->

							<div class="mb-4">

								<label class="form-label fw-semibold"> Password </label>

								<div class="input-group">

									<span class="input-group-text"> <i class="bi bi-lock"></i>
									</span> <input id="password" type="password" class="form-control"
										name="password" placeholder="Enter your password" required>

									<button class="btn btn-outline-secondary" type="button"
										onclick="togglePassword('password','eyeIcon')">

										<i id="eyeIcon" class="bi bi-eye"></i>

									</button>

								</div>

							</div>

							<!-- Login Button -->

							<button type="submit" class="btn btn-primary w-100 login-btn">

								Login</button>

						</form>

						<!-- Register -->

						<div class="text-center mt-4">

							<span class="text-muted"> Don't have an account? </span> <a
								th:href="@{/auth/signup}" class="fw-semibold text-decoration-none">

								Create Account </a>
						</div>

					</div>

				</div>

			</div>

		</div>

	</section>



</body>
</html>
